spring:
  application:
    name: ms-perfiles

  datasource:
    url: jdbc:mysql://localhost:3306/db_plataforma_multimedia?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_perfiles
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true

server:
  port: 8083

# ===================== EUREKA CLIENT =====================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ===================== SWAGGER / OPENAPI =====================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  packages-to-scan: com.pm.ms_perfiles

# ===================== LOGGING =====================
logging:
  level:
    root: INFO
    com.pm.ms_perfiles: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
