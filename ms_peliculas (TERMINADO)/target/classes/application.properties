spring.application.name=ms_peliculas

# ==================== DATASOURCE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/db_plataforma_multimedia
spring.datasource.username=root
spring.datasource.password=

# ==================== PUERTO ====================
server.port=8081

# ==================== JPA / HIBERNATE ====================
# Con Flyway activo, usar "validate" para que Hibernate no toque la BD
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.table=flyway_schema_history_peliculas
spring.flyway.baseline-version=0

# ==================== FLYWAY ====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
